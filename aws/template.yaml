AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Ghost IGL - Full AWS stack (hosting, auth, API, database)

Parameters:
  DomainName:
    Type: String
    Default: r6coaching.com
    Description: Root domain name
  HostedZoneId:
    Type: String
    Default: Z029335322YATCIIJXX6
    Description: Route 53 hosted zone ID
  AcmCertificateArn:
    Type: String
    Description: ACM certificate ARN for r6coaching.com (must be in us-east-1)
  StripeSecretKey:
    Type: String
    NoEcho: true
    Description: Stripe secret key (sk_live_...)
  StripeWebhookSecret:
    Type: String
    NoEcho: true
    Description: Stripe webhook signing secret (whsec_...)
  DesktopTokenSecret:
    Type: String
    NoEcho: true
    Description: HMAC secret for signing desktop activation tokens (random 48+ bytes, base64url)
  StripePriceIdPro:
    Type: String
    Default: price_pro
    Description: Stripe Price ID for the Pro plan (regular post-launch rate)
  StripePriceIdChampion:
    Type: String
    Default: price_champion
    Description: Stripe Price ID for the Champion plan (founding-rate $29 today, regular $39 after May 8)
  StripePriceIdProFounding:
    Type: String
    Default: price_pro_founding
    Description: Stripe Price ID for the Pro founding rate ($9 — pre-May 8)
  StripePriceIdChampionRegular:
    Type: String
    Default: price_champion_regular
    Description: Stripe Price ID for the Champion regular rate ($39 — post-May 8)
  ProPlanAmountCents:
    Type: Number
    Default: 1500
    Description: Pro plan price in cents (used for MRR calculation)
  ChampionPlanAmountCents:
    Type: Number
    Default: 3500
    Description: Champion plan price in cents (used for MRR calculation)
  VodModelId:
    Type: String
    Default: us.anthropic.claude-sonnet-4-5-20250929-v1:0
    Description: Bedrock model ID used for VOD screenshot analysis
  DiscordPublicKey:
    Type: String
    Default: ''
    Description: Discord application public key (hex). Leave empty until bot is created.
  DiscordBotToken:
    Type: String
    NoEcho: true
    Default: ''
    Description: Discord bot token. Leave empty until bot is created.
  DiscordApplicationId:
    Type: String
    Default: ''
    Description: Discord application ID. Leave empty until bot is created.

Globals:
  Function:
    Runtime: nodejs24.x
    Timeout: 30
    Environment:
      Variables:
        SUBSCRIPTIONS_TABLE: !Ref SubscriptionsTable

Resources:

  SiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${DomainName}-site
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  SiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref SiteBucket
      PolicyDocument:
        Statement:
          - Sid: AllowCloudFrontOAC
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub ${SiteBucket.Arn}/*
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}

  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub ${DomainName}-oac
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  SiteSecurityHeadersPolicy:
    Type: AWS::CloudFront::ResponseHeadersPolicy
    Properties:
      ResponseHeadersPolicyConfig:
        Name: !Sub ${AWS::StackName}-security-headers
        SecurityHeadersConfig:
          ContentSecurityPolicy:
            ContentSecurityPolicy: "default-src 'self'; script-src 'self' 'unsafe-inline' https://plausible.io; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.execute-api.us-east-1.amazonaws.com https://plausible.io https://cognito-idp.us-east-1.amazonaws.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self' https://buy.stripe.com"
            Override: true
          ContentTypeOptions:
            Override: true
          FrameOptions:
            FrameOption: DENY
            Override: true
          ReferrerPolicy:
            ReferrerPolicy: strict-origin-when-cross-origin
            Override: true
          StrictTransportSecurity:
            AccessControlMaxAgeSec: 31536000
            IncludeSubdomains: true
            Preload: true
            Override: true

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Aliases:
          - !Ref DomainName
          - !Sub www.${DomainName}
        ViewerCertificate:
          AcmCertificateArn: !Ref AcmCertificateArn
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt SiteBucket.RegionalDomainName
            OriginAccessControlId: !Ref CloudFrontOAC
            S3OriginConfig:
              OriginAccessIdentity: ''
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          ResponseHeadersPolicyId: !Ref SiteSecurityHeadersPolicy
          Compress: true
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
        HttpVersion: http2and3
        PriceClass: PriceClass_100

  DnsRecordRoot:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt CloudFrontDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2

  DnsRecordWww:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Sub www.${DomainName}
      Type: A
      AliasTarget:
        DNSName: !GetAtt CloudFrontDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2

  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: ghost-igl-users
      AutoVerifiedAttributes:
        - email
      UsernameAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 6
          RequireLowercase: false
          RequireNumbers: false
          RequireSymbols: false
          RequireUppercase: false
      Schema:
        - Name: email
          Required: true
          Mutable: true

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: ghost-igl-web
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_SRP_AUTH

  AdminsGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: admins
      UserPoolId: !Ref UserPool
      Description: Users with access to admin dashboard
      Precedence: 1

  SubscriptionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: ghost-igl-subscriptions
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: stripe_customer_id
          AttributeType: S
        - AttributeName: email
          AttributeType: S
      KeySchema:
        - AttributeName: stripe_customer_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: email-index
          KeySchema:
            - AttributeName: email
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  ProfilesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: ghost-igl-profiles
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: email
          AttributeType: S
      KeySchema:
        - AttributeName: email
          KeyType: HASH

  AnnouncementsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: ghost-igl-announcements
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH

  WebhookFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: ghost-igl-stripe-webhook
      CodeUri: ../lambda/webhook/
      Handler: index.handler
      Environment:
        Variables:
          STRIPE_SECRET_KEY: !Ref StripeSecretKey
          STRIPE_WEBHOOK_SECRET: !Ref StripeWebhookSecret
          STRIPE_PRO_PRICE_ID: !Ref StripePriceIdPro
          STRIPE_CHAMPION_PRICE_ID: !Ref StripePriceIdChampion
          STRIPE_PRO_FOUNDING_PRICE_ID: !Ref StripePriceIdProFounding
          STRIPE_CHAMPION_REGULAR_PRICE_ID: !Ref StripePriceIdChampionRegular
          # Lets the webhook auto-provision a Cognito login for paying customers
          # (fixes "paid but NO ACCOUNT" orphans).
          COGNITO_USER_POOL_ID: !Ref UserPool
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SubscriptionsTable
        - Statement:
            - Effect: Allow
              Action:
                - cognito-idp:AdminGetUser
                - cognito-idp:AdminCreateUser
              Resource: !GetAtt UserPool.Arn
      Events:
        Webhook:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /webhook
            Method: POST

  SubscriptionFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: ghost-igl-subscription-api
      CodeUri: ../lambda/subscription/
      Handler: index.handler
      Environment:
        Variables:
          COGNITO_USER_POOL_ID: !Ref UserPool
          COGNITO_CLIENT_ID: !Ref UserPoolClient
          PROFILES_TABLE: !Ref ProfilesTable
          STRIPE_SECRET_KEY: !Ref StripeSecretKey
          PORTAL_RETURN_URL: !Sub https://${DomainName}/#/account
          DESKTOP_TOKEN_SECRET: !Ref DesktopTokenSecret
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref SubscriptionsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ProfilesTable
      Events:
        GetSub:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /subscription
            Method: GET
        SubOptions:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /subscription
            Method: OPTIONS
        GetMe:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /me
            Method: GET
        PutMe:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /me
            Method: PUT
        MeOptions:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /me
            Method: OPTIONS
        PostPortal:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /me/billing-portal
            Method: POST
        PortalOptions:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /me/billing-portal
            Method: OPTIONS
        DesktopVerify:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /desktop/verify
            Method: POST
        DesktopVerifyOptions:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /desktop/verify
            Method: OPTIONS
        PostActivationToken:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /me/activation-token
            Method: POST
        ActivationTokenOptions:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /me/activation-token
            Method: OPTIONS

  AnnouncementsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: ghost-igl-announcements-api
      CodeUri: ../lambda/announcements/
      Handler: index.handler
      Environment:
        Variables:
          COGNITO_USER_POOL_ID: !Ref UserPool
          COGNITO_CLIENT_ID: !Ref UserPoolClient
          ANNOUNCEMENTS_TABLE: !Ref AnnouncementsTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AnnouncementsTable
      Events:
        GetPublic:
          Type: HttpApi
          Properties: { ApiId: !Ref HttpApi, Path: /announcements, Method: GET }
        PublicOptions:
          Type: HttpApi
          Properties: { ApiId: !Ref HttpApi, Path: /announcements, Method: OPTIONS }
        GetAdmin:
          Type: HttpApi
          Properties: { ApiId: !Ref HttpApi, Path: /admin/announcements, Method: GET }
        PostAdmin:
          Type: HttpApi
          Properties: { ApiId: !Ref HttpApi, Path: /admin/announcements, Method: POST }
        AdminOptions:
          Type: HttpApi
          Properties: { ApiId: !Ref HttpApi, Path: /admin/announcements, Method: OPTIONS }
        DeleteAdmin:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /admin/announcements/{id}
            Method: DELETE
        DeleteOptions:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /admin/announcements/{id}
            Method: OPTIONS

  DiscordFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: ghost-igl-discord-bot
      CodeUri: ../lambda/discord/
      Handler: index.handler
      Timeout: 10
      Environment:
        Variables:
          DISCORD_PUBLIC_KEY: !Ref DiscordPublicKey
          DISCORD_BOT_TOKEN: !Ref DiscordBotToken
          DISCORD_APPLICATION_ID: !Ref DiscordApplicationId
          SITE_URL: !Sub https://${DomainName}
      Events:
        Interactions:
          Type: HttpApi
          Properties: { ApiId: !Ref HttpApi, Path: /discord/interactions, Method: POST }

  VodFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: ghost-igl-vod-api
      CodeUri: ../lambda/vod/
      Handler: index.handler
      Timeout: 60
      MemorySize: 512
      Environment:
        Variables:
          COGNITO_USER_POOL_ID: !Ref UserPool
          COGNITO_CLIENT_ID: !Ref UserPoolClient
          VOD_MODEL_ID: !Ref VodModelId
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref SubscriptionsTable
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource:
                - arn:aws:bedrock:*::foundation-model/*
                - !Sub arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:inference-profile/*
      Events:
        Analyze:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /vod/analyze
            Method: POST
        AnalyzeOptions:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /vod/analyze
            Method: OPTIONS

  AdminFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: ghost-igl-admin-api
      CodeUri: ../lambda/admin/
      Handler: index.handler
      Timeout: 60
      Environment:
        Variables:
          COGNITO_USER_POOL_ID: !Ref UserPool
          COGNITO_CLIENT_ID: !Ref UserPoolClient
          PRO_PLAN_AMOUNT_CENTS: !Ref ProPlanAmountCents
          CHAMPION_PLAN_AMOUNT_CENTS: !Ref ChampionPlanAmountCents
          STRIPE_SECRET_KEY: !Ref StripeSecretKey
          STRIPE_PRO_PRICE_ID: !Ref StripePriceIdPro
          STRIPE_CHAMPION_PRICE_ID: !Ref StripePriceIdChampion
          STRIPE_PRO_FOUNDING_PRICE_ID: !Ref StripePriceIdProFounding
          STRIPE_CHAMPION_REGULAR_PRICE_ID: !Ref StripePriceIdChampionRegular
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SubscriptionsTable
        - Statement:
            - Effect: Allow
              Action:
                - cognito-idp:ListUsers
                - cognito-idp:ListUsersInGroup
                - cognito-idp:AdminListGroupsForUser
              Resource: !GetAtt UserPool.Arn
      Events:
        GetSubs:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /admin/subscriptions
            Method: GET
        SubsOptions:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /admin/subscriptions
            Method: OPTIONS
        GetUsers:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /admin/users
            Method: GET
        UsersOptions:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /admin/users
            Method: OPTIONS
        PostBackfill:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /admin/backfill
            Method: POST
        BackfillOptions:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /admin/backfill
            Method: OPTIONS
        PostComp:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /admin/comp
            Method: POST
        CompOptions:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /admin/comp
            Method: OPTIONS

  HttpApiAccessLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      RetentionInDays: 30

  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: prod
      DefaultRouteSettings:
        DetailedMetricsEnabled: true
        ThrottlingBurstLimit: 50
        ThrottlingRateLimit: 25
      AccessLogSettings:
        DestinationArn: !GetAtt HttpApiAccessLogGroup.Arn
        Format: '{ "requestId":"$context.requestId", "routeKey":"$context.routeKey", "status":"$context.status", "responseLength":"$context.responseLength", "integrationLatency":"$context.integrationLatency" }'
      CorsConfiguration:
        AllowOrigins:
          - !Sub https://${DomainName}
          - !Sub https://www.${DomainName}
          - http://localhost:5173
        AllowHeaders:
          - Authorization
          - Content-Type
        AllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS

  HttpApiServerErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Recon6 HTTP API returned server errors
      Namespace: AWS/ApiGateway
      MetricName: 5xx
      Dimensions:
        - Name: ApiId
          Value: !Ref HttpApi
        - Name: Stage
          Value: prod
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching

Outputs:
  SiteBucketName:
    Description: S3 bucket for site files
    Value: !Ref SiteBucket
  CloudFrontDistributionId:
    Description: CloudFront distribution ID
    Value: !Ref CloudFrontDistribution
  ApiUrl:
    Description: API Gateway endpoint - use as VITE_API_BASE_URL
    Value: !Sub https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/prod
  UserPoolId:
    Description: Cognito User Pool ID - use as VITE_COGNITO_USER_POOL_ID
    Value: !Ref UserPool
  UserPoolClientId:
    Description: Cognito App Client ID - use as VITE_COGNITO_CLIENT_ID
    Value: !Ref UserPoolClient
  WebhookUrl:
    Description: Stripe webhook endpoint
    Value: !Sub https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/prod/webhook
