AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Recon6 official Ubisoft patch watcher foundation (review-only, no auto-publish)

Parameters:
  ScheduleExpression:
    Type: String
    Default: cron(15 12 * * ? *)
    Description: Daily EventBridge schedule in UTC
  SourceUrls:
    Type: String
    Default: https://www.ubisoft.com/en-us/game/rainbow-six/siege/news-updates
    Description: Comma-separated official Ubisoft R6 news landing pages

Resources:
  PatchWatcherDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      MessageRetentionPeriod: 1209600
      SqsManagedSseEnabled: true

  PatchWatcherAlarmTopic:
    Type: AWS::SNS::Topic

  PatchSnapshotsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: expire-noncurrent-versions
            Status: Enabled
            NoncurrentVersionExpiration:
              NoncurrentDays: 90

  PatchEventsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: event_id
          AttributeType: S
      KeySchema:
        - AttributeName: event_id
          KeyType: HASH
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true

  PatchWatcherFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: ghost-igl-ubisoft-patch-watcher
      Runtime: nodejs24.x
      Handler: index.handler
      CodeUri: ../lambda/ubisoft-patch-watcher/
      Timeout: 60
      MemorySize: 256
      Environment:
        Variables:
          PATCH_EVENTS_TABLE: !Ref PatchEventsTable
          PATCH_SNAPSHOTS_BUCKET: !Ref PatchSnapshotsBucket
          SOURCE_URLS: !Ref SourceUrls
          MAX_ARTICLES: '20'
      Policies:
        - Statement:
            - Sid: RecordPatchDiscovery
              Effect: Allow
              Action: dynamodb:PutItem
              Resource: !GetAtt PatchEventsTable.Arn
            - Sid: StorePatchEvidence
              Effect: Allow
              Action: s3:PutObject
              Resource: !Sub ${PatchSnapshotsBucket.Arn}/*
      Events:
        DailyPatchCheck:
          Type: ScheduleV2
          Properties:
            ScheduleExpression: !Ref ScheduleExpression
            State: ENABLED
            RetryPolicy:
              MaximumRetryAttempts: 2
              MaximumEventAgeInSeconds: 3600
            DeadLetterConfig:
              Arn: !GetAtt PatchWatcherDeadLetterQueue.Arn

  PatchWatcherDeadLetterQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref PatchWatcherDeadLetterQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowEventBridgeScheduler
            Effect: Allow
            Principal:
              Service: scheduler.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt PatchWatcherDeadLetterQueue.Arn
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId

  PatchWatcherLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      LogGroupName: /aws/lambda/ghost-igl-ubisoft-patch-watcher
      RetentionInDays: 30

  PatchWatcherErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Ubisoft patch watcher Lambda reported an error
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref PatchWatcherFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref PatchWatcherAlarmTopic

  PatchWatcherDeadLetterAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Ubisoft patch watcher exhausted scheduled retries
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Dimensions:
        - Name: QueueName
          Value: !GetAtt PatchWatcherDeadLetterQueue.QueueName
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref PatchWatcherAlarmTopic

Outputs:
  PatchWatcherFunctionName:
    Value: !Ref PatchWatcherFunction
  PatchEventsTableName:
    Value: !Ref PatchEventsTable
  PatchSnapshotsBucketName:
    Value: !Ref PatchSnapshotsBucket
  PatchWatcherDeadLetterQueueUrl:
    Value: !Ref PatchWatcherDeadLetterQueue
  PatchWatcherAlarmTopicArn:
    Value: !Ref PatchWatcherAlarmTopic
