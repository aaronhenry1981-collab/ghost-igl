            "@type": "Answer",

          }
        },
        {
          "@type": "Question",
          "name": "Is Recon 6 free?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes — the Recruit tier is free forever. Every R6 ranked map, operator lineups, callouts, ban targets, and Discord access at no cost. Pro ($9/mo founding) unlocks round-by-round VOD breakdowns (5 screenshots per session, the right utility per site, ban targets with reasoning, opponent reads). Champion ($29/mo founding) adds full-round 10-screenshot sessions, accountability for the picks you made, recurring-weakness reports, and a weekly drill list built from your own clips. All-Access ($19 / $49) extends your tier to every supported game."
          }
        },
        {
          "@type": "Question",
          "name": "Is Recon 6 safe to use? Will I get banned?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes — Recon 6 is TOS-safe by design across every supported game. Nobody ever logs into your account. The web app shows you reference data; the Champion-tier desktop app reads your screen via OCR and capture cards (just like OBS or any streaming software) without injecting into the game. Your rank stays yours."
          }
        },
        {
          "@type": "Question",
          "name": "What does a VOD breakdown actually look like?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Drop 1-10 screenshots from a match — death cams, post-plant freezes, round-end scoreboards. You get back: the specific mistake on each shot ('you held off-angle on the wrong window when Ash entered through the courtyard'), the recurring patterns across the session, and a fix you can apply next round. Not 'use utility better.' Specifics. Pro reviews 5 screenshots per session; Champion reviews 10 and stitches patterns across multiple sessions."
          }
        },
        {
          "@type": "Question",
          "name": "Can I cancel anytime?",
          "acceptedAnswer": {
            "@type": "Answer",

          }
        },

          "@type": "Question",
          "name": "Do I need to install anything?",

            "@type": "Answer",
            "text": "No. Recon 6 is a website. You upload screenshots from your phone or PC and get feedback in your browser. No download, no install, no Windows SmartScreen warnings. Champion subscribers also get access to a beta desktop app for power-user features, but it's optional — the core AI analysis runs entirely on the web."
          }
